<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgilityInformática</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #16161a;
      --surface: #1e1e24;
      --border:  #35353f;
      --accent:  #f0c040;
      --text:    #f2f2f7;
      --label:   #a8a8bc;
      --success: #3ddc84;
      --error:   #ff4d6d;
      --warn:    #ffb347;
      --font:    'Syne', sans-serif;
    }

    html, body {
      min-height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .logo-text { font-size: 20px; font-weight: 800; }
    .logo-text span { color: var(--accent); }
    .badge {
      margin-left: auto;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--label);
      letter-spacing: 1px;
    }

    /* ── Alerts ── */
    .alerts {
      flex-shrink: 0;
      padding: 16px 24px 0;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
    .alert {
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px; font-weight: 600;
      margin-bottom: 10px;
      border-left: 3px solid;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .alert-success { background: rgba(61,220,132,.1);  border-color: var(--success); color: var(--success); }
    .alert-error   { background: rgba(255,77,109,.1);  border-color: var(--error);   color: var(--error); }
    .alert-warning { background: rgba(255,179,71,.1);  border-color: var(--warn);    color: var(--warn); }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 40px;
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 12px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--label);
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 20px;
    }

    .f-link, .f-imagem {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      grid-column: 1 / -1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--label);
    }
    label .req { color: var(--accent); margin-left: 2px; }

    input, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      padding: 13px 14px;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      width: 100%;
    }
    textarea {
      resize: vertical;
      min-height: 110px;
      line-height: 1.55;
    }
    input::placeholder, textarea::placeholder { color: #55556a; }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240,192,64,.12);
    }

    /* ── Rodapé do form ── */
    .form-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      padding-top: 6px;
    }

    .footer-opcoes {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
    }

    /* ── Checkboxes de destino ── */
    .destinos-label, .modo-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--label);
      margin-bottom: 10px;
    }

    .destinos {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .destino-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: border-color .15s, background .15s;
    }
    .destino-item:has(input:checked) {
      border-color: var(--success);
      background: rgba(61,220,132,.07);
    }
    .destino-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      padding: 0;
      margin: 0;
      border: 2px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      cursor: pointer;
      accent-color: var(--success);
    }
    .destino-nome {
      font-size: 13px;
      font-weight: 700;
      color: var(--label);
      white-space: nowrap;
    }
    .destino-item:has(input:checked) .destino-nome {
      color: var(--success);
    }

    /* ── Toggle modo WhatsApp (Automático / Manual) ── */
    .modo-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
    }
    .modo-toggle input[type="radio"] {
      display: none;
    }
    .modo-toggle label {
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
      color: var(--label);
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap;
      margin: 0;
    }
    .modo-toggle input[type="radio"]:checked + label {
      background: var(--accent);
      color: #111114;
    }

    .btn {
      font-family: var(--font);
      font-size: 15px; font-weight: 700;
      border: none; border-radius: 8px;
      cursor: pointer;
      padding: 14px 38px;
      background: var(--accent);
      color: #111114;
      transition: transform .1s, opacity .15s;
      white-space: nowrap;
    }
    .btn:hover  { opacity: .9; }
    .btn:active { transform: scale(.97); }
    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
    }

    .botoes-acao {
      display: flex;
      gap: 12px;
    }

    .btn-secundario {
      background: transparent;
      color: var(--label);
      border: 1px solid var(--border);
    }
    .btn-secundario:hover {
      opacity: 1;
      border-color: var(--error);
      color: var(--error);
    }

    /* ── Bloco de envio manual (Copiar imagem + texto) ── */
    .manual-card {
      display: none;
      flex-direction: column;
    }
    .manual-card.active {
      display: flex;
    }

    .manual-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .manual-header-title {
      font-size: 12px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--label);
    }
    .manual-loading {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
    }

    .manual-lista {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .manual-item {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      align-items: start;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .manual-item:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }

    .manual-item-numero {
      grid-column: 1 / -1;
      font-size: 12px;
      font-weight: 700;
      color: var(--label);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: -4px;
    }

    .manual-imagem-box {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .manual-imagem-wrap {
      width: 100%;
      height: 300px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .manual-imagem-preview {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .manual-texto-box {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }
    .manual-texto-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 360px;
      overflow-y: auto;
      flex: 1;
    }

    .btn-copiar {
      font-family: var(--font);
      font-size: 13px; font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      padding: 11px 20px;
      background: transparent;
      color: var(--text);
      transition: border-color .15s, background .15s, color .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }
    .btn-copiar:hover {
      border-color: var(--accent);
    }
    .btn-copiar.copiado {
      border-color: var(--success);
      color: var(--success);
      background: rgba(61,220,132,.07);
    }

    /* ── Overlay ── */
    .sending-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(22,22,26,.9);
      backdrop-filter: blur(6px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .sending-overlay.active { display: flex; }
    .send-spinner {
      width: 50px; height: 50px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .send-label { font-size: 17px; font-weight: 700; }
    .send-sub   { font-size: 13px; color: var(--label); }

    /* ── Responsividade ── */
    @media (max-width: 750px) {
      main { padding: 16px; }
      .card { padding: 22px; }

      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
      .form-grid > .form-group:first-child {
        grid-column: 1 / -1;
      }
      .f-link, .f-imagem {
        grid-template-columns: 1fr;
      }

      .form-footer { flex-direction: column; align-items: stretch; }
      .destinos { flex-direction: column; }
      .btn { text-align: center; }
      .botoes-acao { flex-direction: column; }

      .manual-item {
        grid-template-columns: 1fr;
      }
      .manual-imagem-wrap {
        height: 220px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">🔥</div>
  <div class="logo-text">Agility<span>Informática</span></div>
  <div class="badge">v2.2</div>
</header>

<div class="alerts" id="alertsBox"></div>

<main>
  <div class="card">
    <div class="card-title">📦 Dados da Oferta</div>
    <form id="ofertaForm" autocomplete="off" autocorrect="off"
          autocapitalize="off" spellcheck="false">

      <input type="text"     name="fake_user" style="display:none">
      <input type="password" name="fake_pass" style="display:none">

      <div class="form-grid">

        <div class="form-group">
          <label>Nome do produto <span class="req">*</span></label>
          <input type="text" name="nome"
                 placeholder="Ex: Xiaomi Redmi Note 13 Pro 256GB"
                 autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                 required>
        </div>

        <div class="form-group">
          <label>Preço <span class="req">*</span></label>
          <input type="text" name="preco"
                 placeholder="Ex: R$ 899,99"
                 autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                 required>
        </div>

        <div class="form-group">
          <label>Cupom</label>
          <input type="text" name="cupom"
                 placeholder="Ex: PROMO10"
                 autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>

        <div class="f-link">
          <div class="form-group">
            <label>Link afiliado <span class="req">*</span></label>
            <input type="url" name="link"
                   placeholder="https://…"
                   autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                   required>
          </div>

          <div class="form-group">
            <label>URL da imagem <span class="req">*</span></label>
            <input type="url" name="imagem" id="inputImagem"
                   placeholder="https://…"
                   autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                   required>
          </div>
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Descrição técnica <span class="req">*</span></label>
          <textarea name="descricao"
                    placeholder="Cole a descrição original do produto aqui…"
                    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                    required></textarea>
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Observação (opcional)</label>
          <input type="text" name="observacao"
                 placeholder="Ex: Frete grátis para Sul e Sudeste"
                 autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>

      </div>

      <div class="form-footer">

        <div class="footer-opcoes">

          <!-- Checkboxes de destino -->
          <div>
            <div class="destinos-label">Onde enviar?</div>
            <div class="destinos">

              <label class="destino-item">
                <input type="checkbox" name="destino_grupo" value="1">
                <span class="destino-nome">📱 Grupo</span>
              </label>

              <label class="destino-item">
                <input type="checkbox" name="destino_canal" value="1">
                <span class="destino-nome">📢 Canal</span>
              </label>

              <label class="destino-item">
                <input type="checkbox" name="destino_telegram" value="1" checked>
                <span class="destino-nome">✈️ Telegram</span>
              </label>

            </div>
          </div>

          <!-- Toggle modo de envio do WhatsApp -->
          <div>
            <div class="modo-label">Envio do WhatsApp</div>
            <div class="modo-toggle">
              <input type="radio" name="modo_whatsapp" value="automatico" id="modoAutomatico">
              <label for="modoAutomatico">🤖 Automático</label>

              <input type="radio" name="modo_whatsapp" value="manual" id="modoManual" checked>
              <label for="modoManual">📋 Manual (copiar)</label>
            </div>
          </div>

        </div>

        <div class="botoes-acao">
          <button type="submit" class="btn" id="btnEnviar">🚀 Gerar e Enviar</button>
          <button type="button" class="btn btn-secundario" id="btnLimpar">🧹 Limpar</button>
        </div>

      </div>

    </form>
  </div>

  <!-- Bloco exibido quando o modo Manual está ativo: lista de produtos
       gerados, cada um com imagem + texto + botões de copiar.
       Os itens vão se acumulando (mais recente no topo). -->
  <div class="card manual-card" id="manualCard">
    <div class="manual-header">
      <div class="manual-header-title">📋 Envio Manual — WhatsApp</div>
      <div class="manual-loading" id="manualLoading"></div>
    </div>
    <div class="manual-lista" id="manualLista"></div>
  </div>
</main>

<div class="sending-overlay" id="sendingOverlay">
  <div class="send-spinner"></div>
  <div class="send-label">Enviando oferta…</div>
  <div class="send-sub" id="sendStep">Gerando mensagem com IA…</div>
</div>

<script>
  const checkboxes      = document.querySelectorAll('.destino-item input[type="checkbox"]');
  const btnEnviar        = document.getElementById('btnEnviar');
  const btnLimpar        = document.getElementById('btnLimpar');
  const form             = document.getElementById('ofertaForm');
  const alertsBox        = document.getElementById('alertsBox');
  const overlay          = document.getElementById('sendingOverlay');
  const stepEl           = document.getElementById('sendStep');

  const manualCard       = document.getElementById('manualCard');
  const manualLoading    = document.getElementById('manualLoading');
  const manualLista      = document.getElementById('manualLista');
  let contadorProdutos   = 0;

  function modoAtual() {
    return document.querySelector('[name="modo_whatsapp"]:checked').value;
  }

  function mostrarAlerta(msg, categoria) {
    const div = document.createElement('div');
    div.className = `alert alert-${categoria}`;
    div.textContent = msg;
    alertsBox.appendChild(div);
    setTimeout(() => div.remove(), 8000);
  }

  // Desabilita o botão de enviar se nenhum destino estiver marcado
  function atualizarBotao() {
    const algumMarcado = [...checkboxes].some(cb => cb.checked);
    btnEnviar.disabled = !algumMarcado;
    btnEnviar.title = algumMarcado ? '' : 'Selecione pelo menos um destino';
  }
  checkboxes.forEach(cb => cb.addEventListener('change', atualizarBotao));
  atualizarBotao();

  // ── Submit via AJAX — a página NUNCA recarrega ──
  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    if (btnEnviar.disabled) return;

    alertsBox.innerHTML = '';

    const grupo    = document.querySelector('[name="destino_grupo"]').checked;
    const canal    = document.querySelector('[name="destino_canal"]').checked;
    const telegram = document.querySelector('[name="destino_telegram"]').checked;
    const manual   = modoAtual() === 'manual';

    // Monta os steps do overlay
    let steps = ["Gerando mensagem com IA…"];
    if (manual) {
      steps.push("Preparando bloco de cópia manual…");
    } else {
      if (grupo) steps.push("Enviando para o grupo…");
      if (canal) steps.push("Enviando para o canal…");
    }
    if (telegram) steps.push("Disparando no Telegram…");

    overlay.classList.add('active');
    let idx = 0;
    stepEl.textContent = steps[0];
    const iv = setInterval(() => {
      idx = (idx + 1) % steps.length;
      stepEl.textContent = steps[idx];
    }, 2200);

    btnEnviar.disabled = true;

    try {
      const formData = new FormData(form);
      const resp = await fetch('/enviar', { method: 'POST', body: formData });
      const data = await resp.json();

      clearInterval(iv);
      overlay.classList.remove('active');
      btnEnviar.disabled = false;
      atualizarBotao();

      if (data.erro) {
        mostrarAlerta('❌ ' + data.erro, 'error');
        return;
      }

      // Exibe resultados de envio automático (Grupo/Canal/Telegram)
      if (data.resultados && data.resultados.length) {
        mostrarAlerta('✅ Oferta enviada com sucesso! (' + data.resultados.join(' + ') + ')', 'success');
      }
      if (data.erros && data.erros.length) {
        mostrarAlerta('⚠️ Falha ao enviar para: ' + data.erros.join(', '), 'warning');
      }

      // Modo manual: adiciona um novo item no TOPO da lista de produtos
      // (imagem + texto + botões de copiar). Itens anteriores permanecem,
      // empilhados abaixo. Gerado sempre que o modo manual estiver ativo,
      // independente de Grupo/Canal estarem marcados.
      if (data.modo_manual_ativo) {
        mostrarAlerta('📋 Modo manual ativado. Use o bloco abaixo para copiar a imagem e o texto.', 'success');

        manualLoading.textContent = '';
        manualCard.classList.add('active');

        // Usa a imagem já redimensionada (base64) vinda do servidor —
        // evita problemas de CORS ao copiar.
        const imagemParaUso = data.imagem_300 || data.imagem_url;
        adicionarItemManual(imagemParaUso, !!data.imagem_300, data.mensagem_whatsapp);

        manualCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

    } catch (err) {
      clearInterval(iv);
      overlay.classList.remove('active');
      btnEnviar.disabled = false;
      atualizarBotao();
      mostrarAlerta('❌ Erro de comunicação com o servidor: ' + err, 'error');
    }
  });

  // ── Botão: copiar texto ──
  // ── Cria um novo item de produto no topo da lista manual ──
  // Cada item tem sua própria imagem, texto e botões de copiar
  // (via closures — não depende de IDs únicos).
  function adicionarItemManual(imagemSrc, isBase64, textoMensagem) {
    contadorProdutos++;

    const item = document.createElement('div');
    item.className = 'manual-item';

    const numero = document.createElement('div');
    numero.className = 'manual-item-numero';
    numero.textContent = `Produto ${String(contadorProdutos).padStart(2, '0')}`;
    item.appendChild(numero);

    // ── Coluna da imagem ──
    const imagemBox = document.createElement('div');
    imagemBox.className = 'manual-imagem-box';

    const imagemWrap = document.createElement('div');
    imagemWrap.className = 'manual-imagem-wrap';

    const img = document.createElement('img');
    img.className = 'manual-imagem-preview';
    img.alt = 'Prévia da imagem';
    img.src = imagemSrc;
    imagemWrap.appendChild(img);

    const btnImg = document.createElement('button');
    btnImg.type = 'button';
    btnImg.className = 'btn-copiar';
    btnImg.textContent = '🖼️ Copiar imagem';
    btnImg.addEventListener('click', () => copiarImagem(imagemSrc, isBase64, btnImg));

    imagemBox.appendChild(imagemWrap);
    imagemBox.appendChild(btnImg);

    // ── Coluna do texto ──
    const textoBox = document.createElement('div');
    textoBox.className = 'manual-texto-box';

    const textoPreview = document.createElement('div');
    textoPreview.className = 'manual-texto-preview';
    textoPreview.textContent = textoMensagem;

    const btnTxt = document.createElement('button');
    btnTxt.type = 'button';
    btnTxt.className = 'btn-copiar';
    btnTxt.textContent = '📝 Copiar texto';
    btnTxt.addEventListener('click', () => copiarTexto(textoMensagem, btnTxt));

    textoBox.appendChild(textoPreview);
    textoBox.appendChild(btnTxt);

    item.appendChild(imagemBox);
    item.appendChild(textoBox);

    // Insere no TOPO da lista (produto mais recente primeiro)
    manualLista.insertBefore(item, manualLista.firstChild);
  }

  // ── Copiar texto ──
  async function copiarTexto(texto, botao) {
    try {
      await navigator.clipboard.writeText(texto);
      marcarCopiado(botao, '📝 Copiar texto');
    } catch (err) {
      alert('Não foi possível copiar o texto: ' + err);
    }
  }

  // ── Copiar imagem (como imagem real, não a URL) ──
  async function copiarImagem(url, isBase64, botao) {
    if (!url) return;

    try {
      let pngBlob;

      if (isBase64) {
        // Imagem já vem pronta (base64, PNG) do servidor — sem CORS.
        const resp = await fetch(url);
        pngBlob = await resp.blob();
      } else {
        // Fallback: imagem original (caso o processamento no servidor falhe)
        const resp = await fetch(url);
        const blob = await resp.blob();
        const bitmap = await createImageBitmap(blob);

        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        canvas.getContext('2d').drawImage(bitmap, 0, 0);
        pngBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      }

      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': pngBlob })
      ]);

      marcarCopiado(botao, '🖼️ Copiar imagem');
    } catch (err) {
      alert(
        'Não foi possível copiar a imagem automaticamente. Tente abrir a ' +
        'imagem em uma nova aba e copiar manualmente.\n\nDetalhes: ' + err
      );
    }
  }

  // ── Botão: limpar formulário ──
  // Limpa apenas os campos do formulário e os alertas.
  // O bloco de imagem/texto gerado (manualLista) NÃO é afetado.
  btnLimpar.addEventListener('click', () => {
    form.reset();
    alertsBox.innerHTML = '';
    atualizarBotao();
  });

  function marcarCopiado(botao, textoOriginal) {
    botao.classList.add('copiado');
    botao.textContent = '✅ Copiado!';
    setTimeout(() => {
      botao.classList.remove('copiado');
      botao.textContent = textoOriginal;
    }, 2000);
  }
</script>
